    <symbol id="ic-pi" viewBox="0 0 800 800"><path fill="#F4F7FB" fill-rule="evenodd" d="M165.29 165.29 H517.36 V400 H400 V517.36 H282.65 V634.72 H165.29 Z M282.65 282.65 V400 H400 V282.65 Z"/><path fill="#F4F7FB" d="M517.36 400 H634.72 V634.72 H517.36 Z"/></symbol>

    <style>
      .wire { fill:none; stroke:#FFD24A; stroke-opacity:.16; stroke-width:1.6; stroke-linecap:round; }
      .beam { fill:none; stroke:#FFD24A; stroke-width:2.6; stroke-linecap:round; stroke-dasharray:18 222; stroke-dashoffset:0; filter:url(#glow); animation:flow 12s linear infinite; }
      .beam.lvl2 { animation-delay:-3s; }
      @keyframes flow { to { stroke-dashoffset:-240; } }
      .spark { fill:#FFF8E1; filter:url(#glow); animation:travel 12s linear infinite; }
      .spark.lvl2 { animation-delay:-3s; }
      @keyframes travel { 0%{offset-distance:0%;opacity:0} 8%{opacity:1} 92%{opacity:1} 100%{offset-distance:100%;opacity:0} }
      .label { font-family:ui-monospace,"SF Mono",Menlo,monospace; fill:#F4F7FB; }
      .name  { font-family:ui-monospace,"SF Mono",Menlo,monospace; fill:#F4F7FB; font-weight:600; }
      .dim   { fill:#8A93A2; }
    </style>
  </defs>

